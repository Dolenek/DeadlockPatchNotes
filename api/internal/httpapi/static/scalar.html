<!doctype html>
<html lang="en">
  <head>
    <title>Deadlock Patch Notes API</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="/deadlock_logo.webp" />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Inter", "Segoe UI", sans-serif;
      }

      .docs-header {
        border-bottom: 1px solid #d8d8d8;
        padding: 14px 18px;
        background: linear-gradient(135deg, #f7f7f7, #ffffff);
      }

      .docs-header h1 {
        margin: 0;
        font-size: 18px;
      }

      .docs-header p {
        margin: 4px 0 0;
        color: #4a4a4a;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <header class="docs-header">
      <h1>Deadlock Patch Notes API</h1>
      <p>v1 contract with cached read optimization and normalized response naming.</p>
    </header>
    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
    <script>
      Scalar.createApiReference("#app", {
        url: "/api/openapi.json",
        theme: "alternate",
        hideModels: false,
      });
    </script>
  </body>
</html>
