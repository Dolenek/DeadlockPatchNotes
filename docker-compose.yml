version: "3.8"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    restart: unless-stopped
    environment:
      API_ADDR: ":8080"
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_HOST_BIND:-0.0.0.0}:${API_PORT:-18081}:8080"

  web:
    build:
      context: ./web
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8080
    depends_on:
      - api
    ports:
      - "${WEB_HOST_BIND:-127.0.0.1}:${WEB_PORT:-3000}:3000"

  sync:
    build:
      context: ./api
    command: ["sync"]
    restart: "no"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      PATCH_FORUM_URL: ${PATCH_FORUM_URL}
      PATCH_SYNC_MAX_PAGES: ${PATCH_SYNC_MAX_PAGES}
      PATCH_SYNC_TIMEOUT_SECONDS: ${PATCH_SYNC_TIMEOUT_SECONDS}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
