services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    restart: unless-stopped
    environment:
      API_ADDR: ":8080"
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      API_READ_CACHE_TTL: ${API_READ_CACHE_TTL:-10m}
      SITE_URL: ${SITE_URL:-https://www.deadlockpatchnotes.com}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_HOST_BIND:-127.0.0.1}:${API_PORT:-18081}:8080"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 256m

  web:
    build:
      context: ./web
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8080
      SITE_URL: ${SITE_URL:-https://www.deadlockpatchnotes.com}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_HOST_BIND:-127.0.0.1}:${WEB_PORT:-3000}:3000"

  sync:
    build:
      context: ./api
    command: ["sync"]
    restart: "no"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      PATCH_FORUM_URL: ${PATCH_FORUM_URL}
      PATCH_STEAM_NEWS_URL: ${PATCH_STEAM_NEWS_URL}
      PATCH_SYNC_MAX_PAGES: ${PATCH_SYNC_MAX_PAGES}
      PATCH_SYNC_TIMEOUT_SECONDS: ${PATCH_SYNC_TIMEOUT_SECONDS}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
